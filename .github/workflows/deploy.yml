name: Deploy on Push (Self-hosted Runner)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Pull latest commit on server
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read

    steps:
      - name: Deploy locally on self-hosted runner
        shell: bash
        env:
          APP_PATH: ${{ secrets.SERVER_APP_PATH }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "${APP_PATH:-}" ]; then
            echo "::error::Missing GitHub secret SERVER_APP_PATH. Set it to your deployed repo path (example: /home/medo/thai-trainer)."
            exit 1
          fi
          git config --global --add safe.directory "$APP_PATH"
          cd "$APP_PATH"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          git fetch --prune origin main
          git reset --hard origin/main
          docker compose up -d --build --remove-orphans